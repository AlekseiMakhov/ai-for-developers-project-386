services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: ../../docker/api.Dockerfile
    volumes:
      - ./apps/api:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/booking
      SECRET_KEY: dev-secret-key-change-in-production
      FRONTEND_URL: http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/web.Dockerfile
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    command: npm run dev -- --host

  e2e:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    network_mode: host
    volumes:
      - ./apps/web:/app
      - e2e_node_modules:/app/node_modules
    working_dir: /app
    environment:
      BASE_URL: http://localhost:5173
      API_URL: http://localhost:8000
    command: >
      sh -c "npm install &&
             npx playwright install chromium &&
             timeout 90 bash -c 'until curl -sf http://localhost:8000/health; do echo waiting for api...; sleep 2; done' &&
             timeout 90 bash -c 'until curl -sf http://localhost:5173; do echo waiting for web...; sleep 2; done' &&
             npx playwright test --project=chromium"
    profiles:
      - e2e

volumes:
  pgdata:
  e2e_node_modules:
