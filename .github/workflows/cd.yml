name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Render deploys
    runs-on: ubuntu-latest

    steps:
      - name: Deploy API
        run: curl -f "${{ secrets.RENDER_API_DEPLOY_HOOK }}"

      - name: Deploy Web
        run: curl -f "${{ secrets.RENDER_WEB_DEPLOY_HOOK }}"
