name: CI

on:
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint + type-check + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app/

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml tests/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage.xml
          retention-days: 7

  web:
    name: Web — lint + type-check + unit tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check (vue-tsc)
        run: npm run type-check

      - name: Lint (oxlint + eslint)
        run: npm run lint

      - name: Build production bundle
        run: npm run build-only

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [api, web]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Node dependencies
        working-directory: apps/web
        run: npm install

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Start services via Docker Compose
        run: docker compose up -d

      - name: Wait for API to be healthy
        run: |
          timeout 90 bash -c \
            'until curl -sf http://localhost:8000/health; do echo "waiting for api..."; sleep 3; done'

      - name: Run DB migrations
        run: docker compose exec api alembic upgrade head

      - name: Wait for web dev server
        run: |
          timeout 90 bash -c \
            'until curl -sf http://localhost:5173; do echo "waiting for web..."; sleep 3; done'

      - name: Run Playwright tests
        working-directory: apps/web
        env:
          BASE_URL: http://localhost:5173
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
