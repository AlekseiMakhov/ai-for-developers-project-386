databases:
  - name: slotbook-db
    databaseName: booking
    user: booking

services:
  - type: web
    name: slotbook-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python scripts/seed.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: slotbook-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://slotbook-web.onrender.com
      - key: DEFAULT_USER_EMAIL
        value: john@example.com
      - key: DEFAULT_USER_PASSWORD
        value: changeme
      - key: DEFAULT_USER_NAME
        value: John Doe
      - key: DEFAULT_USER_SLUG
        value: john

  - type: web
    name: slotbook-web
    runtime: static
    buildCommand: cd apps/web && npm ci && npm run build-only
    staticPublishPath: apps/web/dist
    branch: main
    envVars:
      - key: VITE_API_URL
        value: https://slotbook-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
